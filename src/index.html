<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lizard - Spok</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <!--Link de Google font para formato de letra-->
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark">
  <header class="">
    <div class="container">
      <h1 class="header-h1"> Game Lizard - Spock</h1>
    </div>
  </header>
  <section class="container ">
    <div class="row d-flex justify-content-around" id="lizardSpock">
      <h2 class=" selection text-center">Select an option</h2>
      <button class="btn btn-outline-light col-2 color"  value="rock">🪨 Rock</button>
      <button class="btn btn-outline-light col-2 color"  value="paper">📄 Paper</button>
      <button class="btn btn-outline-light col-2 color"  value="scissors">✂ Scissors</button>
      <button class="btn btn-outline-light col-2 color"  value="lizard">🦎Lizard</button>
      <button class="btn btn-outline-light col-2 color"  value="spock">🖖🏻 Spock</button>
    </div>
  </section>
  <section class="container d-flex justify-content-center w-75">
    <div class="container-texto w-100 mt-4 d-flex justify-content-center align-items-center flex-column">
      <p id="computerSelection" class="box-text"></p>
      <p id="result" class="box-text"></p>
    </div>

  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
